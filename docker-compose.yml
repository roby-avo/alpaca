services:
  postgres:
    container_name: alpaca-postgres
    image: postgres:${ALPACA_POSTGRES_VERSION:-18.1}
    shm_size: ${ALPACA_POSTGRES_SHM_SIZE:-4gb}
    pull_policy: always
    command: >
      postgres
      -c max_connections=${ALPACA_POSTGRES_MAX_CONNECTIONS:-200}
      -c shared_buffers=${ALPACA_POSTGRES_SHARED_BUFFERS:-4GB}
      -c effective_cache_size=${ALPACA_POSTGRES_EFFECTIVE_CACHE_SIZE:-8GB}
      -c work_mem=${ALPACA_POSTGRES_WORK_MEM:-8MB}
      -c maintenance_work_mem=${ALPACA_POSTGRES_MAINTENANCE_WORK_MEM:-1GB}
      -c random_page_cost=${ALPACA_POSTGRES_RANDOM_PAGE_COST:-1.25}
      -c effective_io_concurrency=${ALPACA_POSTGRES_EFFECTIVE_IO_CONCURRENCY:-32}
      -c checkpoint_completion_target=${ALPACA_POSTGRES_CHECKPOINT_COMPLETION_TARGET:-0.9}
      -c max_wal_size=${ALPACA_POSTGRES_MAX_WAL_SIZE:-4GB}
      -c wal_compression=${ALPACA_POSTGRES_WAL_COMPRESSION:-on}
      -c max_parallel_workers=${ALPACA_POSTGRES_MAX_PARALLEL_WORKERS:-4}
      -c max_parallel_workers_per_gather=${ALPACA_POSTGRES_MAX_PARALLEL_WORKERS_PER_GATHER:-1}
    environment:
      POSTGRES_DB: ${ALPACA_POSTGRES_DB:-alpaca}
      POSTGRES_USER: ${ALPACA_POSTGRES_USER:-postgres}
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "${ALPACA_POSTGRES_PORT:-5432}:5432"
    volumes:
      - type: bind
        source: ${ALPACA_POSTGRES_DATA_DIR:-./data/postgres}
        target: /var/lib/postgresql

  adminer:
    container_name: alpaca-adminer
    image: adminer:${ALPACA_ADMINER_VERSION:-5}
    pull_policy: always
    depends_on:
      - postgres
    environment:
      ADMINER_DEFAULT_SERVER: ${ALPACA_ADMINER_DEFAULT_SERVER:-postgres}
    ports:
      - "${ALPACA_ADMINER_PORT:-8080}:8080"

  api:
    container_name: alpaca-api
    build:
      context: .
    image: alpaca:latest
    working_dir: /workspace
    command: ["uvicorn", "src.api:app", "--host", "0.0.0.0", "--port", "8000"]
    depends_on:
      - postgres
    environment:
      ALPACA_DUMP_PATH: ${ALPACA_DUMP_PATH:-/mnt/input/latest-all.json.bz2}
      ALPACA_NER_TYPES_PATH: ${ALPACA_NER_TYPES_PATH:-}
      ALPACA_LABELS_DB_PATH: ${ALPACA_LABELS_DB_PATH:-/workspace/data/output/wikidata_labels.sqlite}
      ALPACA_BOW_OUTPUT_PATH: ${ALPACA_BOW_OUTPUT_PATH:-/workspace/data/output/bow_docs.jsonl.gz}
      ALPACA_POSTGRES_DSN: ${ALPACA_POSTGRES_DSN:-postgresql://postgres@postgres:5432/alpaca}
    ports:
      - "${ALPACA_API_PORT:-8000}:8000"
    volumes:
      - type: bind
        source: ${ALPACA_INPUT_DIR:-./data/input}
        target: /mnt/input
        read_only: true
      - type: bind
        source: ${ALPACA_OUTPUT_DIR:-./data/output}
        target: /workspace/data/output
      - type: bind
        source: ./src
        target: /workspace/src
        read_only: true
      - type: bind
        source: ./scripts
        target: /workspace/scripts
        read_only: true
